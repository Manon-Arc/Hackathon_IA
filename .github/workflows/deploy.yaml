name: CI Build, Push and Deploy AI Assistant

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      release_url: ${{ steps.create_release.outputs.html_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get tag name
        id: vars
        run: |
          RAW_TAG=${GITHUB_REF#refs/tags/}
          CLEAN_TAG=$(echo $RAW_TAG | tr '+' '-')
          echo "tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: rendu/devweb
          file: rendu/devweb/deploy/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/ai_assistant:${{ steps.vars.outputs.tag }}
            ${{ secrets.REGISTRY_URL }}/ai_assistant:latest
    
      - name: Create Image Info File
        run: |
          echo "### 🐳 Docker Image Information" > docker-info.txt
          echo "Registry: ${{ secrets.REGISTRY_URL }}" >> docker-info.txt
          echo "Repository: ai_assistant" >> docker-info.txt
          echo "Tag: ${{ steps.vars.outputs.tag }}" >> docker-info.txt
          echo "" >> docker-info.txt
          echo "### 🚀 How to pull this version:" >> docker-info.txt
          echo "docker login ${{ secrets.REGISTRY_URL }}" >> docker-info.txt
          echo "docker pull ${{ secrets.REGISTRY_URL }}/ai_assistant:${{ steps.vars.outputs.tag }}" >> docker-info.txt
          echo "" >> docker-info.txt
          echo "Image Digest: $(docker inspect --format='{{index .RepoDigests 0}}' ${{ secrets.REGISTRY_URL }}/fiestapp-api:${{ steps.vars.outputs.tag }})" >> docker-info.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.vars.outputs.tag }}
          body: |
            ## 📦 Docker Image Available
            An official image for this release has been pushed to the private registry.

            **Pull command:**
            ```bash
            docker pull ${{ secrets.REGISTRY_URL }}/ai_assistant:${{ steps.vars.outputs.tag }}
            ```
          generate_release_notes: true
          files: |
            docker-info.txt
          draft: false
          prerelease: false

  deploy-vps:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() 
    steps:
      - name: Check Build Status
        if: needs.build-and-push.result != 'success'
        run: exit 1

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd ${{ secrets.VPS_APP_PATH }}
            docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASSWORD }}
            docker compose pull assistant-financier
            docker compose up -d assistant-financier

      - name: 🔔 Discord Final Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            # MESSAGE SUCCÈS ULTRA COMPLET
            curl -H "Content-Type: application/json" -X POST -d '{
              "username": "Mizu Registry",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "content": "🚀 **AI Assistant - Déploiement Réussi !**\n\n**🌐📜 Release & Versioning:**\nTag: `${{ needs.build-and-push.outputs.tag }}`\n🔗 [Consulter la Release GitHub](${{ needs.build-and-push.outputs.release_url }})\n\n**
            }' ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            # MESSAGE ÉCHEC
            curl -H "Content-Type: application/json" -X POST -d '{
              "username": "Mizu Registry Error",
              "avatar_url": "https://cdn-icons-png.flaticon.com/512/595/595067.png",
              "content": "❌ **Échec critique du Pipeline AI Assistant !**\n\n**Détails de l’erreur:**\nService: `assistant-financier`\nTag: `${{ needs.build-and-push.outputs.tag }}`\nCommit: `${{ github.sha }}`\n\n⚠️ Le déploiement a été interrompu. Vérifiez les logs immédiatement :\n🔗 [Logs GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            }' ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi