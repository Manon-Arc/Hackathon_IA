services:
  web:
    build:
      context: ..              # racine du repo (rendu/devweb), pas deploy/
      dockerfile: deploy/Dockerfile
    image: assistant-financier:latest
    container_name: assistant-financier
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "5000:5000"
    volumes:
      - chat_history:/app/backend/instance
      - logs:/app/backend/logs

volumes:
  chat_history:
  logs: